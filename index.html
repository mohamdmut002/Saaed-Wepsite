<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساعد للأنظمة المرورية | SAAED Traffic Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Tajawal:wght@400;500;700;900&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="lang-ar">

<!-- ============ LANGUAGE GATE ============ -->
<section id="gate">
  <div class="gate-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#eef1f3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <h1 class="gate-title">ساعد للأنظمة المرورية</h1>
  <h4 class="gate-title">ساحات الحجز المرورية</h4>
  <p class="gate-sub">اختر لغتك للمتابعة &nbsp;·&nbsp; <b>Choose your language</b> &nbsp;·&nbsp; اپنی زبان منتخب کریں</p>
  <p class="gate-city">Abu Dhabi – Musaffah · ابوظبی – مصفح</p>

  <div class="signs">
    <button class="sign-btn" data-lang="ar" onclick="selectLang('ar')">
      <span class="flag">🇦🇪</span>
      <span class="sign-native">العربية</span>
      <span class="sign-en">Arabic</span>
    </button>
    <button class="sign-btn" data-lang="en" onclick="selectLang('en')">
      <span class="flag">🇬🇧</span>
      <span class="sign-native">English</span>
      <span class="sign-en">English</span>
    </button>
    <button class="sign-btn" data-lang="ur" onclick="selectLang('ur')">
      <span class="flag">🇵🇰</span>
      <span class="sign-native">اردو</span>
      <span class="sign-en">Urdu</span>
    </button>
  </div>

  <div class="gate-lane"><div class="lane-line"></div></div>
</section>

<!-- ============ MAIN SITE ============ -->
<div id="site">
  <header class="topbar">
    <div class="brand">
      <div class="dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="#eef1f3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="brand-name">
        <span data-i18n="brand"></span>
        <small data-i18n="tagline_small"></small>
      </div>
    </div>
    <div class="lang-switch">
      <button data-lang="ar" onclick="selectLang('ar')">AR</button>
      <button data-lang="en" onclick="selectLang('en')">EN</button>
      <button data-lang="ur" onclick="selectLang('ur')">UR</button>
    </div>
  </header>

  <div class="lane-line"></div>

  <section class="hero">
    <h1 data-i18n="hero_title"></h1>
    <p data-i18n="hero_sub"></p>
    <span class="addr" data-i18n="hero_addr"></span>
  </section>

  <main>
    <!-- LAWS & DOCUMENTS -->
    <div class="section-block">
      <div class="section-head laws">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#d64545" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M5 7 2 13a3 3 0 0 0 6 0L5 7Z"/><path d="M19 7l-3 6a3 3 0 0 0 6 0l-3-6Z"/><path d="M3 21h18"/><path d="M5 7h14"/></svg>
        </div>
        <div>
          <h2 data-i18n="laws_title"></h2>
          <p data-i18n="laws_desc"></p>
        </div>
      </div>
      <div class="law-list" id="law-list"></div>
    </div>

    <!-- YARD LOCATIONS -->
    <div class="section-block">
      <div class="section-head yards">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="#25876a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <h2 data-i18n="yards_title"></h2>
          <p data-i18n="yards_desc"></p>
        </div>
      </div>
      <div class="yard-grid" id="yard-grid"></div>
    </div>
  </main>

  <div class="lane-line"></div>
  <footer>
    <div data-i18n="footer_text"></div>
    <div class="foot-addr" data-i18n="hero_addr"></div>
  </footer>
</div>

<!-- ============ SAMPLE AUTHORIZATION MODAL ============ -->
<div id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box">
    <img src="images/authorization-sample.png" alt="Sample authorization letter">
    <h4 data-i18n="modal_title"></h4>
    <p class="modal-note" data-i18n="modal_note"></p>
    <button class="modal-close" onclick="closeModal()" data-i18n="modal_close"></button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
